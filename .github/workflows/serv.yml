name: Serv00 Cron Keeper

on:
  schedule:
    - cron: '12 09 * * *'
    - cron: '0 8 19 * *' 
  workflow_dispatch:
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  check-and-repair:
    name: 检查并修复 Cron 任务
    if: github.event.schedule == '12 */1 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Check and Repair Cron
        id: check_cron
        env:
          SSH_HOST: ${{ secrets.SERV00_HOST }}
          SSH_USER: ${{ secrets.SERV00_USER }}
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
          CRON_KEYWORD: ${{ secrets.CRON_KEYWORD }}
          CRON_LINE: ${{ secrets.CRON_LINE }}
        run: |
          # 设置 SSH 密码环境变量
          export SSHPASS="$SSH_PASS"
          
          echo "🔍 检查 Cron 任务状态..."
          
          # 修复：先获取 crontab 内容，不检查退出码
          # 2>&1 将错误输出也捕获，防止脚本因错误退出
          CRONTAB_CONTENT=$(sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${SSH_USER}@${SSH_HOST} "crontab -l 2>&1")
          SSH_EXIT_CODE=$?
          
          echo "SSH 退出码: $SSH_EXIT_CODE"
          
          # 判断是否有任务被删除的情况
          # 如果 crontab -l 返回 "no crontab for username" 或者内容为空
          if echo "$CRONTAB_CONTENT" | grep -q "no crontab for"; then
            echo "📭 Crontab 为空（没有任何任务）"
            HAS_TASK=false
          elif echo "$CRONTAB_CONTENT" | grep -q "$CRON_KEYWORD"; then
            echo "✅ 任务存在"
            HAS_TASK=true
          else
            echo "❌ 任务不存在（crontab 有其他任务，但没有我们的目标任务）"
            HAS_TASK=false
          fi
          
          # 根据检查结果执行操作
          if [ "$HAS_TASK" = true ]; then
            echo "status=exists" >> $GITHUB_OUTPUT
          else
            echo "❌ 任务丢失，正在重建..."
            
            # 获取现有 crontab 内容（如果有的话）
            # 如果 crontab -l 返回 "no crontab for username"，则 EXISTING_CRON 为空
            EXISTING_CRON=$(sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${SSH_USER}@${SSH_HOST} "crontab -l 2>/dev/null || true")
            
            # 创建新 crontab 内容
            NEW_CRON_CONTENT="${EXISTING_CRON}${CRON_LINE}"
            
            # 通过 echo 管道的方式写入 crontab
            echo "$NEW_CRON_CONTENT" | sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${SSH_USER}@${SSH_HOST} "crontab -"
            
            if [ $? -eq 0 ]; then
              echo "✅ 重建成功"
              echo "status=repaired" >> $GITHUB_OUTPUT
            else
              echo "❌ 重建失败"
              echo "status=failed" >> $GITHUB_OUTPUT
            fi
          fi
          
          # 显示最终状态（调试用）
          echo "最终 crontab 内容:"
          sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${SSH_USER}@${SSH_HOST} "crontab -l 2>&1"
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2.1.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 0
      - name: Send Telegram Notification
        if: steps.check_cron.outputs.status != 'exists'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRON_LINE: ${{ secrets.CRON_LINE }}
          STATUS: ${{ steps.check_cron.outputs.status }}
        run: |
          CURRENT_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          if [ "$STATUS" = "repaired" ]; then
            MESSAGE="✅ *Serv00 Cron 自动修复成功*%0A%0A🕒 时间: \`$CURRENT_TIME\`%0A"
          else
            MESSAGE="❌ *Serv00 Cron 修复失败*%0A%0A🕒 时间: \`$CURRENT_TIME\`%0A🚨 请手动检查 Serv00"
          fi
          
          # 添加日志链接
          # MESSAGE="${MESSAGE}%0A%0A[查看日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown" \
            -o /dev/null
          
  keep-alive:
       name: 保持仓库活跃
       if: github.event.schedule == '0 0 */25 * *' || github.event_name == 'workflow_dispatch'
       runs-on: ubuntu-latest
       permissions:
         contents: write
       steps:
       - name: Checkout repository
         uses: actions/checkout@v6
         with:
           fetch-depth: 0
          
       - name: Configure Git
         run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
       - name: Make empty commit
         run: |
          git commit --allow-empty -m "chore: keep-alive commit $(date +'%Y-%m-%d')"
          git push origin main
          echo "✅ 已创建并推送空提交，仓库保持活跃"
