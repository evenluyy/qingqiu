name: Serv00 Cron Keeper

on:
  schedule:
    - cron: '*/43 * * * *'  # 每10分钟运行一次
  workflow_dispatch:  # 支持手动触发

jobs:
  check-and-repair:
    name: 检查并修复 Cron 任务
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Check and Repair Cron
        id: check_cron
        env:
          SSH_HOST: ${{ secrets.SERV00_HOST }}
          SSH_USER: ${{ secrets.SERV00_USER }}
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
          CRON_KEYWORD: ${{ secrets.CRON_KEYWORD }}
          CRON_LINE: ${{ secrets.CRON_LINE }}
        run: |
          # 设置 SSH 密码环境变量
          export SSHPASS="$SSH_PASS"
          
          echo "🔍 检查 Cron 任务状态..."
          
          # 检查任务是否存在
          CHECK_RESULT=$(sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${SSH_USER}@${SSH_HOST} "crontab -l 2>/dev/null | grep '${CRON_KEYWORD}'" 2>&1)
          
          if [ $? -eq 0 ] && [ -n "$CHECK_RESULT" ]; then
            echo "✅ 任务存在，无需操作"
            echo "status=exists" >> $GITHUB_OUTPUT
          else
            echo "❌ 任务丢失，正在重建..."
            
            # 重建任务
            sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${SSH_USER}@${SSH_HOST} "(crontab -l 2>/dev/null; echo '${CRON_LINE}') | crontab -"
            
            if [ $? -eq 0 ]; then
              echo "✅ 重建成功"
              echo "status=repaired" >> $GITHUB_OUTPUT
            else
              echo "❌ 重建失败"
              echo "status=failed" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Send Telegram Notification
        if: steps.check_cron.outputs.status != 'exists'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRON_LINE: ${{ secrets.CRON_LINE }}
          STATUS: ${{ steps.check_cron.outputs.status }}
        run: |
          CURRENT_TIME=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          if [ "$STATUS" = "repaired" ]; then
            MESSAGE="✅ *Serv00 Cron 自动修复成功*%0A%0A🕒 时间: \`$CURRENT_TIME\`%0A📋 任务: \`$CRON_LINE\`"
          else
            MESSAGE="❌ *Serv00 Cron 修复失败*%0A%0A🕒 时间: \`$CURRENT_TIME\`%0A🚨 请手动检查 Serv00"
          fi
          
          # 添加日志链接
          MESSAGE="${MESSAGE}%0A%0A[查看日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=Markdown"
