name: Debug Serv00 Connection

on:
  workflow_dispatch:  # 手动触发

jobs:
  debug-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Debug Connection
        env:
          SSH_HOST: ${{ secrets.SERV00_HOST }}
          SSH_USER: ${{ secrets.SERV00_USER }}
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          echo "=== 环境信息 ==="
          echo "主机: $SSH_HOST"
          echo "用户: $SSH_USER"
          echo "密码长度: ${#SSH_PASS} 位"
          
          echo -e "\n=== 测试 DNS 解析 ==="
          ping -c 2 $SSH_HOST || echo "⚠️ ping 失败（可能被禁，但不影响SSH）"
          
          echo -e "\n=== 测试端口连通性 (22) ==="
          nc -zv -w 5 $SSH_HOST 22 && echo "✅ 端口22可连接"
          
          echo -e "\n=== 测试 SSH 连接 ==="
          # 关键修复：显式设置 SSHPASS 环境变量
          export SSHPASS="$SSH_PASS"
          
          # 测试简单命令
          sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${SSH_USER}@${SSH_HOST} "echo 'SSH连接成功' && whoami"
          
          EXIT_CODE=$?
          echo -e "\n=== 退出码: $EXIT_CODE ==="
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ SSH连接成功"
          else
            echo "❌ SSH连接失败"
            echo "退出码 $EXIT_CODE 含义："
            case $EXIT_CODE in
              1) echo "  - 无效的命令行参数" ;;
              2) echo "  - 连接问题或密码错误" ;;
              3) echo "  - 公钥认证问题" ;;
              4) echo "  - 主机密钥验证失败" ;;
              5) echo "  - 密码错误" ;;
              6) echo "  - 程序启动失败" ;;
              *) echo "  - 未知错误" ;;
            esac
          fi
