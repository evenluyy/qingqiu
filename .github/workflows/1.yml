name: Debug Serv00 Connection

on:
  workflow_dispatch:  # 手动触发

jobs:
  debug-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Debug Connection
        env:
          SSH_HOST: ${{ secrets.SERV00_HOST }}
          SSH_USER: ${{ secrets.SERV00_USER }}
          SSH_PASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          echo "=== 环境信息 ==="
          echo "主机: $SSH_HOST"
          echo "用户: $SSH_USER"
          echo "密码长度: ${#SSH_PASS} 位"
          
          echo -e "\n=== 测试 DNS 解析 ==="
          ping -c 2 $SSH_HOST || echo "❌ ping 失败（可能被禁）"
          
          echo -e "\n=== 测试端口连通性 (22) ==="
          nc -zv -w 5 $SSH_HOST 22 || echo "❌ 端口 22 无法连接"
          
          echo -e "\n=== 测试 SSH 连接（详细输出）==="
          sshpass -e ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${SSH_USER}@${SSH_HOST} "echo 'SSH连接成功'" 2>&1
          
          EXIT_CODE=$?
          echo -e "\n=== 退出码: $EXIT_CODE ==="
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ SSH连接成功"
          else
            echo "❌ SSH连接失败"
            
            # 常见错误提示
            echo -e "\n=== 可能的原因 ==="
            echo "1. 主机地址错误 - 检查 SERV00_HOST 是否正确"
            echo "2. 用户名错误 - 检查 SERV00_USER 是否正确"
            echo "3. 密码错误 - 检查 SERV00_PASSWORD 是否正确"
            echo "4. Serv00 封禁了 GitHub 的 IP"
            echo "5. Serv00 SSH 服务暂时不可用"
          fi
