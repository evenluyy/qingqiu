name: Convert Loyalsoldier Rules to sing-box SRS

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/convert-rules.yml'

env:
  RULES_REPO: "https://github.com/Loyalsoldier/clash-rules.git"
  GEOIP_REPO: "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/geoip.conf"

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install sing-box
        run: |
          go install github.com/sagernet/sing-box/cmd/sing-box@latest

      - name: Create working directories
        run: |
          mkdir -p ./tmp/rules
          mkdir -p ./output

      - name: Clone clash-rules repository
        run: |
          git clone --depth 1 ${{ env.RULES_REPO }} ./tmp/clash-rules

      - name: Extract domain rules
        run: |
          cp ./tmp/clash-rules/rules/telegram.txt ./tmp/rules/telegram_domain.txt
          cp ./tmp/clash-rules/rules/openai.txt ./tmp/rules/openai.txt
          cp ./tmp/clash-rules/rules/cn.txt ./tmp/rules/geosite-cn.txt
          cp ./tmp/clash-rules/rules/tiktok.txt ./tmp/rules/geosite-tiktok.txt
          cp ./tmp/clash-rules/rules/proxy.txt ./tmp/rules/geolocation-!cn.txt

      - name: Extract IP rules
        run: |
          wget -q ${{ env.GEOIP_REPO }} -O ./tmp/geoip.conf
          
          sed -n '/^telegram:/,/^$/p' ./tmp/geoip.conf | \
            grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?' > ./tmp/rules/telegram_ip.txt
          
          sed -n '/^cn:/,/^$/p' ./tmp/geoip.conf | \
            grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?' > ./tmp/rules/geoip-cn.txt

      - name: Convert to SRS using Python
        run: |
          pip install pyyaml
          
          cat > convert.py << 'EOF'
import json
import subprocess
from pathlib import Path

def convert_to_srs(txt_file, srs_file, rule_type="domain"):
    with open(txt_file, 'r') as f:
        lines = [line.strip() for line in f if line.strip() and not line.startswith('#')]
    
    if not lines:
        print(f"Skipping {txt_file} - empty")
        return False
    
    if rule_type == "domain":
        rules = []
        for line in lines:
            if line.startswith('+.'):
                rules.append({"domain_suffix": line[2:]})
            elif line.startswith('.'):
                rules.append({"domain_suffix": line[1:]})
            elif '*' in line:
                rules.append({"domain_keyword": line.replace('*', '')})
            else:
                rules.append({"domain": line})
    else:
        rules = [{"ip_cidr": line} for line in lines]
    
    rule_set = {"version": 1, "rules": rules}
    
    with open('temp_rule.json', 'w') as f:
        json.dump(rule_set, f, indent=2)
    
    result = subprocess.run(
        ['sing-box', 'rule-set', 'compile', 'temp_rule.json', '-o', srs_file],
        capture_output=True, text=True
    )
    
    if result.returncode != 0:
        print(f"Error: {result.stderr}")
        return False
    
    print(f"Converted {txt_file} -> {srs_file}")
    return True

# Convert domain rules
domain_files = [
    ('telegram_domain.txt', 'telegram_domain.srs'),
    ('openai.txt', 'openai.srs'),
    ('geosite-cn.txt', 'geosite-cn.srs'),
    ('geosite-tiktok.txt', 'geosite-tiktok.srs'),
    ('geolocation-!cn.txt', 'geolocation-!cn.srs'),
]

# Convert IP rules
ip_files = [
    ('telegram_ip.txt', 'telegram_ip.srs'),
    ('geoip-cn.txt', 'geoip-cn.srs'),
]

for txt_file, srs_file in domain_files:
    txt_path = Path('./tmp/rules') / txt_file
    if txt_path.exists():
        convert_to_srs(txt_path, Path('./output') / srs_file, "domain")

for txt_file, srs_file in ip_files:
    txt_path = Path('./tmp/rules') / txt_file
    if txt_path.exists():
        convert_to_srs(txt_path, Path('./output') / srs_file, "ip")
EOF
          
          python3 convert.py

      - name: List generated files
        run: |
          echo "=== Generated SRS files ==="
          ls -la ./output/*.srs 2>/dev/null || echo "No SRS files found"
          echo ""
          echo "=== File sizes ==="
          du -sh ./output/*.srs 2>/dev/null || echo "No files"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: singbox-rules-srs
          path: ./output/*.srs
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: rules-${{ github.run_number }}
          name: "Rule Update - ${{ github.run_number }}"
          body: |
            Auto-generated sing-box SRS rules from Loyalsoldier sources
            
            **Rules included:**
            - telegram_domain.srs
            - telegram_ip.srs
            - geolocation-!cn.srs
            - openai.srs
            - geosite-cn.srs
            - geoip-cn.srs
            - geosite-tiktok.srs
            
            **Update frequency:** Weekly (every Monday 8 AM UTC)
          files: |
            ./output/*.srs
