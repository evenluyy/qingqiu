name: Convert Loyalsoldier Rules to sing-box SRS

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/convert-rules.yml'

env:
  RULES_REPO: "https://github.com/Loyalsoldier/clash-rules.git"
  GEOIP_REPO: "https://raw.githubusercontent.com/Loyalsoldier/geoip/release/geoip.conf"

jobs:
  convert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install sing-box
        run: |
          go install github.com/sagernet/sing-box/cmd/sing-box@latest

      - name: Create working directories
        run: |
          mkdir -p ./tmp/rules
          mkdir -p ./output

      - name: Clone clash-rules repository
        run: |
          git clone --depth 1 ${{ env.RULES_REPO }} ./tmp/clash-rules

      - name: Extract domain rules
        run: |
          cp ./tmp/clash-rules/rules/telegram.txt ./tmp/rules/telegram_domain.txt
          cp ./tmp/clash-rules/rules/openai.txt ./tmp/rules/openai.txt
          cp ./tmp/clash-rules/rules/cn.txt ./tmp/rules/geosite-cn.txt
          cp ./tmp/clash-rules/rules/tiktok.txt ./tmp/rules/geosite-tiktok.txt
          cp ./tmp/clash-rules/rules/proxy.txt ./tmp/rules/geolocation-\\!cn.txt

      - name: Extract IP rules from geoip.conf
        run: |
          wget -q ${{ env.GEOIP_REPO }} -O ./tmp/geoip.conf
          
          sed -n '/^telegram:/,/^$/p' ./tmp/geoip.conf | \
            grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?' > ./tmp/rules/telegram_ip.txt
          
          sed -n '/^cn:/,/^$/p' ./tmp/geoip.conf | \
            grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}(\/[0-9]{1,2})?' > ./tmp/rules/geoip-cn.txt

      - name: Create Python converter script
        run: |
          echo 'import json' > convert.py
          echo 'import subprocess' >> convert.py
          echo 'from pathlib import Path' >> convert.py
          echo '' >> convert.py
          echo 'def convert_to_srs(txt_file, srs_file, rule_type="domain"):' >> convert.py
          echo '    with open(txt_file, "r") as f:' >> convert.py
          echo '        lines = [line.strip() for line in f if line.strip() and not line.startswith("#")]' >> convert.py
          echo '    if not lines:' >> convert.py
          echo '        print(f"Skipping {txt_file} - empty")' >> convert.py
          echo '        return False' >> convert.py
          echo '    if rule_type == "domain":' >> convert.py
          echo '        rules = []' >> convert.py
          echo '        for line in lines:' >> convert.py
          echo '            if line.startswith("+."):' >> convert.py
          echo '                rules.append({"domain_suffix": line[2:]})' >> convert.py
          echo '            elif line.startswith("."):' >> convert.py
          echo '                rules.append({"domain_suffix": line[1:]})' >> convert.py
          echo '            elif "*" in line:' >> convert.py
          echo '                rules.append({"domain_keyword": line.replace("*", "")})' >> convert.py
          echo '            else:' >> convert.py
          echo '                rules.append({"domain": line})' >> convert.py
          echo '    else:' >> convert.py
          echo '        rules = [{"ip_cidr": line} for line in lines]' >> convert.py
          echo '    rule_set = {"version": 1, "rules": rules}' >> convert.py
          echo '    with open("temp_rule.json", "w") as f:' >> convert.py
          echo '        json.dump(rule_set, f, indent=2)' >> convert.py
          echo '    result = subprocess.run([' >> convert.py
          echo '        "sing-box", "rule-set", "compile", "temp_rule.json", "-o", srs_file],' >> convert.py
          echo '        capture_output=True, text=True)' >> convert.py
          echo '    if result.returncode != 0:' >> convert.py
          echo '        print(f"Error: {result.stderr}")' >> convert.py
          echo '        return False' >> convert.py
          echo '    print(f"Converted {txt_file} -> {srs_file}")' >> convert.py
          echo '    return True' >> convert.py
          echo '' >> convert.py
          echo '# Convert domain rules' >> convert.py
          echo 'domain_files = [' >> convert.py
          echo '    ("telegram_domain.txt", "telegram_domain.srs"),' >> convert.py
          echo '    ("openai.txt", "openai.srs"),' >> convert.py
          echo '    ("geosite-cn.txt", "geosite-cn.srs"),' >> convert.py
          echo '    ("geosite-tiktok.txt", "geosite-tiktok.srs"),' >> convert.py
          echo '    ("geolocation-!cn.txt", "geolocation-!cn.srs"),' >> convert.py
          echo ']' >> convert.py
          echo '' >> convert.py
          echo '# Convert IP rules' >> convert.py
          echo 'ip_files = [' >> convert.py
          echo '    ("telegram_ip.txt", "telegram_ip.srs"),' >> convert.py
          echo '    ("geoip-cn.txt", "geoip-cn.srs"),' >> convert.py
          echo ']' >> convert.py
          echo '' >> convert.py
          echo 'for txt_file, srs_file in domain_files:' >> convert.py
          echo '    txt_path = Path("./tmp/rules") / txt_file' >> convert.py
          echo '    if txt_path.exists():' >> convert.py
          echo '        convert_to_srs(str(txt_path), str(Path("./output") / srs_file), "domain")' >> convert.py
          echo '' >> convert.py
          echo 'for txt_file, srs_file in ip_files:' >> convert.py
          echo '    txt_path = Path("./tmp/rules") / txt_file' >> convert.py
          echo '    if txt_path.exists():' >> convert.py
          echo '        convert_to_srs(str(txt_path), str(Path("./output") / srs_file), "ip")' >> convert.py

      - name: Run Python converter
        run: |
          python3 convert.py

      - name: List generated files
        run: |
          echo "=== Generated SRS files ==="
          ls -la ./output/*.srs 2>/dev/null || echo "No SRS files found"
          echo ""
          echo "=== File sizes ==="
          du -sh ./output/*.srs 2>/dev/null || echo "No files"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: singbox-rules-srs
          path: ./output/*.srs
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: rules-${{ github.run_number }}
          name: "Rule Update - ${{ github.run_number }}"
          body: |
            Auto-generated sing-box SRS rules from Loyalsoldier sources
            
            Rules included:
            - telegram_domain.srs
            - telegram_ip.srs
            - geolocation-!cn.srs
            - openai.srs
            - geosite-cn.srs
            - geoip-cn.srs
            - geosite-tiktok.srs
            
            Update frequency: Weekly (every Monday 8 AM UTC)
          files: |
            ./output/*.srs
